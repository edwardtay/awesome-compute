name: Refresh GitHub Metadata

on:
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run metadata:refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: refresh GitHub metadata"
          file_pattern: "data/github-snapshot.json"
