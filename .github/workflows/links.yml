name: Check Links

on:
  pull_request:
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
  schedule:
    - cron: "23 6 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md CONTRIBUTING.md
          fail: true
