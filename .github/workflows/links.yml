name: Check Links

on:
  pull_request:
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
  schedule:
    - cron: "23 6 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --verbose --no-progress --max-retries 3 --timeout 60 README.md CONTRIBUTING.md
          fail: true
