name: Refresh Stats

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "scripts/generate-stats.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run stats:build
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: refresh list stats"
          file_pattern: "data/badges/*.json"
