  <text x="1128" y="226" text-anchor="end" fill="#fff" fill-opacity=".34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" letter-spacing="2.4">AWESOME COMPUTE / FIELD GUIDE</text>
