    <rect x="902" y="168" width="92" height="36" rx="8"/>
    <rect x="1014" y="168" width="92" height="36" rx="8"/>
  </g>

  <path d="M720 54h66c42 0 42 66 84 66h44c42 0 42 66 84 66h16" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M610 120h18" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>

  <g fill="#5eead4">
    <rect x="236" y="51" width="42" height="6" rx="3" opacity=".7"/>
    <rect x="372" y="51" width="28" height="6" rx="3" opacity=".45"/>
    <rect x="468" y="51" width="68" height="6" rx="3" opacity=".6"/>
