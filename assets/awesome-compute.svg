    <rect x="454" y="36" width="154" height="36" rx="8"/>
    <rect x="628" y="36" width="92" height="36" rx="8"/>

    <rect x="390" y="102" width="220" height="36" rx="8" fill="#a78bfa" fill-opacity=".09" stroke="#c4b5fd" stroke-opacity=".28"/>
    <rect x="634" y="102" width="150" height="36" rx="8"/>

    <rect x="566" y="168" width="92" height="36" rx="8"/>
    <rect x="678" y="168" width="92" height="36" rx="8"/>
