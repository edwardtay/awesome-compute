<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 248" role="img" aria-labelledby="title desc">
  <title id="title">Abstract compute scheduling planes</title>
  <desc id="desc">A restrained diagram of workloads passing through queue, scheduler, and execution planes.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0d1422"/>
      <stop offset=".58" stop-color="#141a2b"/>
      <stop offset="1" stop-color="#1c1838"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <pattern id="microgrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#fff" stroke-opacity=".035"/>
    </pattern>
  </defs>
  <rect width="1200" height="248" rx="22" fill="url(#background)"/>
  <rect width="1200" height="248" rx="22" fill="url(#microgrid)"/>
  <path d="M0 0h1200v248H0z" fill="none" stroke="#fff" stroke-opacity=".07"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" letter-spacing="2.2">
    <text x="72" y="58" fill="#7e899b">01 / QUEUE</text>
    <text x="72" y="124" fill="#7e899b">02 / SCHEDULE</text>
    <text x="72" y="190" fill="#7e899b">03 / EXECUTE</text>
  </g>

  <g fill="none" stroke="#fff" stroke-opacity=".1">
